# linearazor fact-sheet template
#
# Phase-1 to Phase-2 handoff. Illustrative shape; pin to the actual
# Linear MCP wire format at implementation time (spec section 13).
#
# Placeholder values in angle brackets ("<group-name>", "<ISSUE-ID>",
# "YYYY-MM-DD") document the substitution points. Phase 1 replaces
# them before Phase 2 reads the document. Keep them quoted so YAML
# parses them as strings rather than attempting date / number coercion.

schemaVersion: 1
group: "<group-name>"

horizon:
  kind: cycle              # cycle | week | 2w | 4w | milestone | since
  from: "YYYY-MM-DD"
  to: "YYYY-MM-DD"

lookahead:
  kind: cycle
  from: "YYYY-MM-DD"
  to: "YYYY-MM-DD"
  suppressed: false        # true when the user passed "lookahead off"
                           # or the primary horizon is "since <date>"

thresholds:
  agingWipDays: 7
  silentDays: 7
  noPrDays: 3
  prReviewDays: 3
  scopeMinIssues: 1

members:
  - displayName: "<name>"
    identifier: "<linear-user-id>"

unresolved: []             # member names that failed to resolve against
                           # Linear users; surfaced in the setup-health
                           # footer, never as stalls

projects:
  - name: "<project-name>"
    state: started         # started | paused | completed | canceled
    inScopeIssueCount: 0   # count of issues in this project passing any
                           # of C1-C4 of the composite horizon filter
                           # (ingest-and-factsheet.md step 3.3); drives
                           # the empty-project scope-hygiene stall
    cycleAssignedIssueCount: 0
                           # count of issues with cycleId equal to the
                           # active cycle's ID. By construction
                           # cycleAssignedIssueCount <= inScopeIssueCount
                           # for cycle horizons. Drives the
                           # cycle-field-unpopulated scope-hygiene stall
                           # (signals.md)
    inScopeIssueIdsByPath:
      c1: []               # IDs that passed via cycle assignment
      c2: []               # IDs that passed via milestone date in horizon
      c3: []               # IDs that passed via dueDate in horizon
      c4: []               # IDs that passed via status-history overlap
                           # with the horizon window
    milestones:
      - name: "<milestone-name>"
        targetDate: "YYYY-MM-DD"
        datesMovedInWindow: []
    shipped:
      - id: "<ISSUE-ID>"
        url: "https://linear.app/<workspace>/issue/<ISSUE-ID>/<slug>"
        title: "<title>"
        completedAt: "ISO-8601"
        estimate:
          value: null      # numeric (e.g. 5) when set, else null
          name: null       # display string (e.g. "L", "5") when set, else null
        linkedPRs:
          - url: "https://github.com/<org>/<repo>/pull/<n>"
            openedAt: "ISO-8601"
            prOpenedAtApproximate: false   # true when the MCP didn't
                                            # expose the PR open date and
                                            # Phase 1 inferred it from
                                            # the issue's status history
    openIssues:
      - id: "<ISSUE-ID>"
        url: "https://linear.app/<workspace>/issue/<ISSUE-ID>/<slug>"
        title: "<title>"
        status: "<status>"
        assigneeIdentifier: "<linear-user-id>"
        daysInStatus: 0
        lastCommentDaysAgo: 0   # days since the most recent of last-comment
                                # and last-update. When the Linear MCP surfaces
                                # comment timestamps, set to (today - lastCommentAt);
                                # otherwise fall back to (today - updatedAt) so the
                                # questions lane's staleness check still fires
                                # (signals.md "Activity proxy"). The alias
                                # lastActivityDaysAgo carries the same value;
                                # Phase 2 reads either name.
        estimate:
          value: null
          name: null
        linkedPRs:
          - url: "https://github.com/<org>/<repo>/pull/<n>"
            openedAt: "ISO-8601"
            prOpenedAtApproximate: false
        blockedBy: []
        revertedAt: null   # ISO-8601 timestamp of the most recent
                           # Done -> started-or-unstarted transition
                           # inside the primary horizon, else null;
                           # drives the Reverted stall
        milestone: null
        labels: []
        bodyHasAcceptanceCriteria: false
    scopeChangesInWindow:
      - id: "<ISSUE-ID>"
        url: "https://linear.app/<workspace>/issue/<ISSUE-ID>/<slug>"
        change: "<change-kind>"   # added-to-milestone | removed-from-milestone | labels-changed | project-state-moved
        at: "ISO-8601"
    lookaheadMilestones:
      - name: "<milestone-name>"
        targetDate: "YYYY-MM-DD"
        startedIssueCount: 0
        daysToTarget: 0
        scopeChangedSinceTargetSet: false
    lookaheadIssues:
      - id: "<ISSUE-ID>"
        url: "https://linear.app/<workspace>/issue/<ISSUE-ID>/<slug>"
        title: "<title>"
        assigneeIdentifier: null
        status: "<status>"
        milestone: null
        bodyHasAcceptanceCriteria: false
        bodyIsEmpty: true
